<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>时间播报助手</title>
  <meta name="description" content="时间播报助手是一款轻量时间提醒 App，可在指定时间段内重复播报当前时间与自定义提醒内容。">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="eyebrow">TimeBroadcast</p>
      <h1>时间播报助手</h1>
      <p class="lead">在固定时间段内，用更清晰的语音播报帮你建立节奏。适合学习、工作、出门准备和家庭作息等场景。</p>
      <div class="actions">
        <a class="button primary" href="support.html">支持与帮助</a>
        <a class="button" href="privacy.html">隐私政策</a>
      </div>
    </section>

    <section class="card-grid">
      <article class="card">
        <h2>核心能力</h2>
        <ul>
          <li>自定义开始时间、结束时间和播报间隔</li>
          <li>支持自定义播报文案与 <code>{time}</code> 占位符</li>
          <li>前台语音播报，锁屏后通过本地通知继续提醒</li>
          <li>无需登录，不依赖网络</li>
        </ul>
      </article>

      <article class="card">
        <h2>适用场景</h2>
        <ul>
          <li>学习专注提醒</li>
          <li>会议与休息节奏提醒</li>
          <li>出门前准备流程</li>
          <li>家庭作息与时间感训练</li>
        </ul>
      </article>

      <article class="card">
        <h2>产品原则</h2>
        <ul>
          <li>本地优先，不收集不必要数据</li>
          <li>无广告、无第三方跟踪、无订阅</li>
          <li>以简单、稳定、可长期使用为目标</li>
        </ul>
      </article>
    </section>
  </main>
</body>
</html>
